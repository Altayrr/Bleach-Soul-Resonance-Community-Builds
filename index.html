<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLEACH - Soul Resonance Archives</title>
<style>
  html, body {
    min-height: 100%;
    margin: 0;
    background: #020305;
    color: #e8eaf0;
    font-family: Georgia, serif;
  }
  .loading {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 24px;
    text-align: center;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: #a0d8ef;
  }
  .loading a { color: #f0c060; }
</style>
<script>
(function routeByDevice() {
  var params = new URLSearchParams(window.location.search);
  var wantsDesktop = params.get('view') === 'desktop';
  var mobilePath = 'index-mobile.html';
  var isPhone = window.matchMedia && window.matchMedia('(max-width: 820px)').matches;

  if (isPhone && !wantsDesktop && !window.location.pathname.endsWith('/' + mobilePath)) {
    window.location.replace(mobilePath);
  }
})();
</script>
</head>
<body>
<div class="loading">Loading archives...</div>
<script>
const desktopSource = 'https://raw.githubusercontent.com/Altayrr/Bsr-Community-Site/61ceb19bf287d1969d31350ef9b9e6bad365a666/index.html';

fetch(desktopSource, { cache: 'no-store' })
  .then(function(response) {
    if (!response.ok) throw new Error('Could not load desktop archive source');
    return response.text();
  })
  .then(function(html) {
    document.open();
    document.write(html);
    document.close();
  })
  .catch(function(error) {
    document.body.innerHTML = '<div class="loading">Could not load the archive.<br><br><a href="index-mobile.html">Open mobile site</a></div>';
    console.error(error);
  });
</script>
</body>
</html>
