<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLEACH - Soul Resonance Archives Mobile</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;900&family=Noto+Serif+JP:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">

</head>
<body class="mobile-page">

<div id="bg-atmosphere">
  <div class="bleach-moon"></div>
  <div class="moon-stars">
    <div class="star" style="top:10%; left:25%; width:3px; height:3px; animation-delay:0.2s;"></div>
    <div class="star" style="top:20%; left:15%; width:2px; height:2px; animation-delay:0.8s;"></div>
    <div class="star" style="top:35%; left:30%; width:2.5px; height:2.5px; animation-delay:1.4s;"></div>
    <div class="star" style="top:8%; left:45%; width:2px; height:2px; animation-delay:0.5s;"></div>
    <div class="star" style="top:25%; left:5%; width:2px; height:2px; animation-delay:1.1s;"></div>
  </div>
</div>

      <rect x="1700" y="160" width="14" height="440"/><polygon points="1707,142 1721,160 1693,160"/>
    </g>
    <g opacity="0.12" fill="#0e1422">
      <rect x="700" y="200" width="30" height="400"/><rect x="680" y="180" width="70" height="22"/><rect x="690" y="158" width="50" height="24"/><polygon points="715,138 740,158 690,158"/>
      <rect x="680" y="210" width="550" height="8" rx="2"/><rect x="1190" y="200" width="30" height="400"/><rect x="1170" y="180" width="70" height="22"/>

      <rect x="710" y="248" width="18" height="14"/><rect x="740" y="248" width="18" height="14"/><rect x="770" y="248" width="18" height="14"/>
      <rect x="800" y="248" width="18" height="14"/><rect x="830" y="248" width="18" height="14"/><rect x="860" y="248" width="18" height="14"/>
      <rect x="890" y="248" width="18" height="14"/><rect x="920" y="248" width="18" height="14"/><rect x="950" y="248" width="18" height="14"/>
      <rect x="980" y="248" width="18" height="14"/><rect x="1010" y="248" width="18" height="14"/><rect x="1040" y="248" width="18" height="14"/>
      <rect x="1070" y="248" width="18" height="14"/><rect x="1100" y="248" width="18" height="14"/><rect x="1130" y="248" width="18" height="14"/>

  </svg>
</div>
<div id="energy-streams"></div><div id="petals-container"></div><canvas id="bg-canvas"></canvas>
<div id="overlay" onclick="closePanel()"></div>

<header>
  <p class="title-sub">Soul Society Research and Development Institute</p>
</header>

<div class="division-bar">
<button class="div-tab active" onclick="setCategoryFilter('all', this)">All</button>
  <button class="div-tab" onclick="setCategoryFilter('captain', this)">Captains</button>
  <button class="div-tab" onclick="setCategoryFilter('lieutenant', this)">Lieutenants</button>
  <button class="div-tab" onclick="setCategoryFilter('espada', this)">Espada</button>
  <button class="div-tab" onclick="setCategoryFilter('karakura', this)">Karakura Town</button>
  <button class="div-tab" onclick="setCategoryFilter('hollow', this)">Hollow</button>
</div>

<main id="stage">
  <div class="filter-bars-container">
    <div class="filter-bar" id="type-filter-bar">
      <button class="filter-type-btn" onclick="setTypeFilter('Slash', this)">Slash</button>
      <button class="filter-type-btn" onclick="setTypeFilter('Spirit', this)">Spirit</button>
      <button class="filter-type-btn" onclick="setTypeFilter('Thrust', this)">Thrust</button>
      <button class="filter-type-btn" onclick="setTypeFilter('Strike', this)">Strike</button>
    </div>
    <p class="section-title">Select a character to open their records</p>
    <div class="filter-bar" id="role-filter-bar">
      <button class="filter-role-btn" onclick="setRoleFilter('Dps', this)">Dps</button>
      <button class="filter-role-btn" onclick="setRoleFilter('Tactic', this)">Tactic</button>
      <button class="filter-role-btn" onclick="setRoleFilter('Support', this)">Support</button>
    </div>
  </div>
  <div id="char-grid"></div>
</main>

<div id="info-panel">
  <button class="panel-close" onclick="closePanel()">✕</button>
  <div class="panel-hero" id="panel-hero">
    <div class="panel-hero-bg"></div>
    <div class="panel-hero-art" id="panel-art"></div>
    <div class="panel-hero-overlay"></div>
    <div class="panel-name-block">
      <div class="panel-division-label" id="panel-division-label"></div>
      <div class="panel-char-name" id="panel-char-name"></div>
      <div class="panel-char-jp" id="panel-char-jp"></div>
    </div>
  </div>
  <div class="panel-body">
    <div class="char-quote" id="panel-quote"></div>
    <div class="stats-section"><div id="panel-stats"></div></div>
    <div class="section-label">Zanpakutō</div>
    <div class="zanpakuto-block" id="panel-zanpakuto"></div>
    <div style="background:transparent; padding:0; margin-top:24px;">
      <div class="section-label">Instructions</div>
      <div class="instructions-block" id="panel-instructions"></div>
    </div>
    <div style="background:transparent; padding:0; margin-top:28px;">
      <div class="section-label">Bonds</div>
      <div class="bond-rectangle" id="panel-bonds1"></div>
      <div class="bond-rectangle" id="panel-bonds2"></div>
    </div>
    <div style="background:transparent; padding:0; margin-top:28px;">
      <div class="section-label">Core Stamp</div>
      <div class="stamp-block" id="panel-core-stamp">
        <div class="stamp-placeholder">Core Stamp — Add Animated Media</div>
      </div>
    </div>
    <div style="background:transparent; padding:0; margin-top:24px;">
      <div class="section-label">Set Stamps</div>
      <div class="stamp-block" id="panel-set-stamps">
        <div class="stamp-placeholder">Set Stamps — Add Animated Media</div>
      </div>
    </div>
    <div style="background:transparent; padding:0; margin-top:24px;">
      <div class="section-label">Weapon Stamp</div>
      <div class="stamp-block stamp-block-weapon" id="panel-weapon-stamp">
        <div class="stamp-placeholder">Weapon Stamp — Add Animated Media</div>
      </div>
    </div>
  </div>
</div>

<script src="app.js" defer></script>
<script src="mobile.js" defer></script>

        'height' : 50,
        'width' : 320,
        'params' : {}
      };
    </script>
    <script src="https://www.highperformanceformat.com/96fa16e718e78ba9fc6e4b7a947a158b/invoke.js"></script>
  </div>
</div>
  
<script src='https://storage.ko-fi.com/cdn/scripts/overlay-widget.js'></script>
<script>

    kofiWidgetOverlay.draw('altayrr', {
      'type': 'floating-chat',

      'floating-chat.donateButton.background-color': '#f45d22',
      'floating-chat.donateButton.text-color': '#fff'
    });
  }
</script>
</body>
</html>
